name: CI
on:
  push:
    branches: [main, feat/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-coverage: true
      run-audit: false
      coverage-exclude: 'crates/*'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@main
    with:
      language: rust
      fail-on-vulnerability: true

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --locked cargo-audit
      - run: cargo audit --deny warnings

  # Docs are built and deployed by .github/workflows/docs.yml on push to main.
  # The previous external `pipelines/docs.yml` reusable workflow wrote to a
  # gh-pages branch; the new local workflow uses the Pages-from-Actions deploy.
